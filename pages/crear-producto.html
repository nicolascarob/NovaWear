<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaWear - Crear Producto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Kurale&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/admin-home.css"> 
    <style>
        .form-container {
            max-width: 900px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            padding: 20px;
        }
        .image-preview-zone {
            border: 2px dashed #ccc;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 450px;
            background-size: cover;
            background-position: center;
            background-color: #f9f9f9;
            flex-direction: column;
            cursor: pointer;
        }
        .form-fields {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .form-group label {
            font-weight: 600;
            font-family: 'Inter', sans-serif;
        }
        .form-group input, .form-group textarea {
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        .btn-guardar {
            background: #000;
            color: #fff;
            padding: 15px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }
        .btn-guardar:hover {
            background: #333;
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <a class="Logo" href="admin-home.html">
                <img src="../assets/iconos/logo.svg" alt="">
                <span class="nombre-logo">NovaWear</span>
            </a>
            <span style="font-weight: bold; color: #666;">MODO CREADOR</span>
        </div>
    </header>

    <main>
        <div style="text-align: center; margin-top: 30px;">
            <h2>AÑADIR NUEVA PRENDA AL CATÁLOGO</h2>
            <p>Completa la información para sincronizar con la base de datos</p>
        </div>

        <form class="form-container" id="form-crear-producto">
            <div class="image-preview-zone" id="preview-container" onclick="document.getElementById('input-imagen').click()">
                <span id="preview-text" style="color: #888; text-align: center; padding: 20px;">Haz clic aquí para cargar la imagen de la prenda</span>
                <input type="file" id="input-imagen" accept="image/*" style="display: none;">
            </div>

            <div class="form-fields">
                <div class="form-group">
                    <label for="nombre-producto">Nombre del Producto</label>
                    <input type="text" id="nombre-producto" placeholder="Ej: Camiseta de Lino Minimalista" required>
                </div>

                <div class="form-group">
                    <label for="precio-producto">Precio (COP)</label>
                    <input type="number" id="precio-producto" placeholder="Ej: 120000" required>
                </div>

                <div class="form-group">
                    <label for="descripcion-producto">Descripción</label>
                    <textarea id="descripcion-producto" rows="5" placeholder="Describe los acabados, tipo de tela, etc..." required></textarea>
                </div>

                <button type="submit" class="btn-guardar">GUARDAR EN TIENDA</button>
            </div>
        </form>
    </main>

    <script src="../js/crear-producto.js"></script>
</body>
</html>
