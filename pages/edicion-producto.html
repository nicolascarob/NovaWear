<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaWear - Editar Prenda</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Kurale&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/edicion-producto.css">
</head>

<body>

    <!-- ===== HEADER ===== -->
    <header class="main-header">

        <div class="header-container">

            <!-- Logo -->
            <a class="Logo" href="admin-home.html">

                <img src="../assets/iconos/logo.svg" aria-label="Logo NovaWear" alt="Logo NovaWear">

                <span class="nombre-logo">
                    NovaWear
                </span>

            </a>

            <!-- Navegación -->
            <nav class="nav-categorias">

                <a href="mujer.html" class="boton-nav">
                    Mujer
                </a>

                <a href="hombre.html" class="boton-nav">
                    Hombre
                </a>

                <a href="admin-home.html#colecciones-titulo" class="boton-nav">
                    Lo nuevo
                </a>

            </nav>

            <!-- Iconos -->
            <nav class="nav-iconos" aria-label="Herramientas de usuario">

                <a href="favoritos.html" class="boton-icon icono-favoritos" aria-label="Ver favoritos">

                    <img src="../assets/iconos/favoritos.svg" alt="Favoritos">

                </a>

                <a href="carrito.html" class="boton-icon icono-bolsa" aria-label="Ver carrito">

                    <img src="../assets/iconos/bolsa.svg" alt="Carrito">

                </a>

                <a href="login.html" class="boton-icon icono-usuario" aria-label="Mi cuenta">

                    <img src="../assets/iconos/cuenta.svg" alt="Cuenta">

                </a>

            </nav>

        </div>

    </header>

    <!-- ===== MAIN ===== -->
    <main>

        <div class="product-edit-container fade-in-admin">

            <!-- ===== IMAGEN ===== -->
            <div class="product-image-section">

                <div class="edit-card-img" id="productImageDisplay"
                    style="background-image: url('../img/Camiseta estilo polo.jpg');">

                    <label class="change-photo-overlay" title="Subir nueva imagen">

                        <input type="file" id="editProductFileInput" accept="image/*" hidden>

                        <span class="upload-icon">
                            📷
                        </span>

                        <span>
                            Subir otra imagen
                        </span>

                    </label>

                </div>

            </div>

            <!-- ===== INFO PRODUCTO ===== -->
            <div class="product-info-section premium-panel">

                <form id="editProductForm">

                    <!-- ID oculto -->
                    <input type="hidden" id="productId">

                    <!-- Nombre -->
                    <div class="form-group">

                        <label for="productName">
                            Nombre de la prenda
                        </label>

                        <input type="text" id="productName" class="form-control" required>
                    </div>

                    <!-- Precio -->
                    <div class="form-group">

                        <label for="productPrice">
                            Precio de venta
                        </label>

                        <input type="number" id="productPrice" class="form-control" required>

                    </div>

                    <!-- Descripción -->
                    <div class="form-group">

                        <label for="productDescription">
                            Descripción detallada
                        </label>

                        <textarea id="productDescription" class="form-control" rows="6"
                            placeholder="Escribe las características de la prenda aquí..." required></textarea>

                    </div>

                    <!-- ===== BOTONES ADMIN ===== -->
                    <div class="admin-actions">

                        <button type="submit" class="btn-admin btn-guardar">
                            Guardar cambios
                        </button>

                        <button type="button" class="btn-admin btn-eliminar">
                            Eliminar prenda
                        </button>

                    </div>

                </form>

            </div>

        </div>

    </main>

    <!-- ===== FOOTER ===== -->
    <footer>

        <div class="footer-grid">

            <!-- Marca -->
            <div class="footer-col">

                <h4>
                    NOVAWEAR
                </h4>

                <p>
                    Moda contemporánea para quienes buscan expresar
                    su estilo único.
                </p>

            </div>

            <!-- Compras -->
            <div class="footer-col">

                <h4>
                    COMPRAS
                </h4>

                <ul>

                    <li>
                        <a href="#">
                            Mujer
                        </a>
                    </li>

                    <li>
                        <a href="#">
                            Hombre
                        </a>
                    </li>

                    <li>
                        <a href="#">
                            Lo nuevo
                        </a>
                    </li>

                </ul>

            </div>

            <!-- Ayuda -->
            <div class="footer-col">

                <h4>
                    AYUDA
                </h4>

                <ul>

                    <li>
                        <a href="#">
                            Envíos
                        </a>
                    </li>

                    <li>
                        <a href="#">
                            Devoluciones
                        </a>
                    </li>

                    <li>
                        <a href="#">
                            Contacto
                        </a>
                    </li>

                </ul>

            </div>

            <!-- Redes -->
            <div class="footer-col">

                <h4>
                    SÍGUENOS
                </h4>

                <ul>

                    <li>
                        <a href="#">
                            Instagram
                        </a>
                    </li>

                    <li>
                        <a href="#">
                            Facebook
                        </a>
                    </li>

                </ul>

            </div>

        </div>

        <!-- Copyright -->
        <div class="copyright">

            <p>
                &copy; 2026 NOVAWEAR.
                Todos los derechos reservados.
            </p>

        </div>

    </footer>

    <!-- JS -->
    <script src="../js/edicion-producto.js"></script>

</body>

</html>
